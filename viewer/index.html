<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCAD 几何标注工具</title>
<style>
  /* ─── Light theme palette ─────────────────────────────────────────────
     bg          #f7f7f8   app background / canvas backdrop
     surface     #ffffff   panels, cards, inputs
     surface-2   #fafafb   subtle alt panel
     border      #e5e6eb   default borders / hairlines
     border-2    #ececf0   softer divider
     text        #1f2024   primary text
     text-2      #5b606b   secondary text
     text-3      #8b8f99   tertiary / placeholder / line numbers
     accent      #2b6cff   primary action (blue)
     accent-h    #1e57e0   hover
     accent-bg   #eaf1ff   accent tint
     warn        #f08a3e   secondary highlight (orange)
     warn-bg     #fdeede   orange tint
  */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", system-ui, sans-serif;
    background: #f7f7f8;
    color: #1f2024;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    -webkit-font-smoothing: antialiased;
    font-size: 13px;
  }

  /* ─── Header ───────────────────────────────────────────────────────── */
  #header {
    background: #ffffff;
    padding: 0 16px;
    height: 44px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #e5e6eb;
    flex-shrink: 0;
  }
  #header h1 {
    font-size: 13px; font-weight: 600; color: #1f2024;
    letter-spacing: 0.1px;
    display: flex; align-items: center; gap: 8px;
  }
  #header h1::before {
    content: ""; width: 14px; height: 14px; border-radius: 3px;
    background: linear-gradient(135deg, #2b6cff 0%, #2b6cff 55%, #f08a3e 55%, #f08a3e 100%);
    display: inline-block;
  }
  .header-sep { width: 1px; height: 18px; background: #e5e6eb; margin: 0 4px; }

  /* Buttons — flat, subtle borders, blue primary */
  button { font-family: inherit; }
  #toggle-scad, #watch-btn {
    height: 28px; padding: 0 12px; border-radius: 5px;
    font-size: 12.5px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  #toggle-scad {
    background: #ffffff; color: #5b606b; border: 1px solid #e5e6eb;
  }
  #toggle-scad:hover { color: #1f2024; border-color: #c8ccd4; background: #fafafb; }
  #watch-btn {
    background: #ffffff; color: #1f2024; border: 1px solid #e5e6eb;
  }
  #watch-btn:hover { border-color: #2b6cff; color: #2b6cff; background: #f5f8ff; }
  #watch-btn.watching {
    background: #f08a3e; color: #fff; border-color: #f08a3e; font-weight: 500;
  }
  #watch-btn.watching:hover { background: #e07a2e; border-color: #e07a2e; }

  #status { font-size: 12px; color: #8b8f99; margin-left: auto; }

  #watch-indicator {
    display: none; align-items: center; gap: 6px;
    font-size: 12px; color: #f08a3e;
    padding: 0 10px; height: 24px; border-radius: 12px;
    background: #fdeede;
  }
  #watch-indicator.active { display: inline-flex; }
  #watch-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #f08a3e;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  #main { display: flex; flex: 1; overflow: hidden; }

  /* ─── SCAD 预览面板 ───────────────────────────────────────────────── */
  #scad-panel {
    width: 280px; background: #fafafb; border-right: 1px solid #e5e6eb;
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    transition: width 0.2s;
  }
  #scad-panel.collapsed { width: 0; border-right: none; }
  #scad-header {
    padding: 10px 14px; border-bottom: 1px solid #ececf0;
    flex-shrink: 0; display: flex; align-items: center; gap: 8px;
    height: 38px;
  }
  #scad-header h3 {
    font-size: 11.5px; color: #5b606b; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #scad-mtime { font-size: 10.5px; color: #8b8f99; white-space: nowrap; font-variant-numeric: tabular-nums; }
  #scad-code {
    flex: 1; overflow: auto; margin: 0; padding: 10px 6px 10px 0;
    font-family: "JetBrains Mono", "Cascadia Code", "Consolas", "SF Mono", monospace;
    font-size: 12px; line-height: 1.6; color: #3a3d44;
    background: #fafafb; white-space: pre; counter-reset: line;
  }
  #scad-code .ln { display: block; padding-right: 8px; }
  #scad-code .ln::before {
    content: counter(line); counter-increment: line;
    display: inline-block; width: 32px; color: #b8bcc6;
    text-align: right; margin-right: 12px; user-select: none;
    font-size: 11px;
  }
  /* SCAD syntax — soft light-theme palette */
  #scad-code .kw { color: #2b6cff; font-weight: 500; }
  #scad-code .cm { color: #9aa0aa; font-style: italic; }
  #scad-code .nm { color: #1f8a5b; }
  #scad-code .st { color: #c84a1a; }

  /* ─── Canvas ───────────────────────────────────────────────────────── */
  #canvas-wrapper { flex: 1; position: relative; background: #f0f1f3; }
  #canvas-wrapper.drag-over {
    outline: 2px dashed #2b6cff; outline-offset: -8px;
    background: #eaf1ff;
  }
  #drop-hint {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); text-align: center;
    color: #8b8f99; pointer-events: none;
  }
  #drop-hint .icon { font-size: 44px; margin-bottom: 14px; opacity: 0.5; }
  #drop-hint p { font-size: 13px; }
  canvas { display: block; max-width: 100%; max-height: 100%; }

  /* ─── Sidebar ─────────────────────────────────────────────────────── */
  #sidebar {
    width: 304px; background: #ffffff; border-left: 1px solid #e5e6eb;
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }

  /* Section headings shared style */
  .section-h {
    font-size: 11px; color: #5b606b; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.7px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-h::before {
    content: ""; width: 3px; height: 11px; background: #2b6cff;
    border-radius: 1px;
  }
  .section-h.orange::before { background: #f08a3e; }

  #face-info { padding: 14px 16px; border-bottom: 1px solid #ececf0; }
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; margin-bottom: 6px; min-height: 18px;
  }
  .info-label { color: #8b8f99; }
  .info-value {
    color: #1f2024; font-family: "JetBrains Mono", "SF Mono", monospace;
    font-size: 11.5px; font-variant-numeric: tabular-nums;
  }
  .semantic-badge {
    display: inline-block; background: #eaf1ff; color: #2b6cff;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
    font-family: inherit;
  }
  #no-selection {
    color: #8b8f99; font-size: 12.5px; text-align: center;
    padding: 18px 0 6px;
  }

  #annotation-form { padding: 14px 16px; border-bottom: 1px solid #ececf0; }
  label {
    display: block; font-size: 11.5px; color: #5b606b;
    margin-bottom: 5px; margin-top: 10px; font-weight: 500;
  }
  label:first-of-type { margin-top: 0; }
  input[type="text"], textarea {
    width: 100%; background: #fafafb; border: 1px solid #e5e6eb;
    color: #1f2024; padding: 7px 9px; border-radius: 5px;
    font-size: 12.5px; font-family: inherit;
    transition: border-color 0.12s, background 0.12s;
  }
  input[type="text"]::placeholder, textarea::placeholder { color: #b0b4be; }
  textarea { height: 60px; resize: vertical; line-height: 1.5; }
  input[type="text"]:focus, textarea:focus {
    outline: none; border-color: #2b6cff; background: #ffffff;
    box-shadow: 0 0 0 3px rgba(43,108,255,0.12);
  }
  #add-btn {
    width: 100%; margin-top: 12px;
    background: #2b6cff; color: #fff; border: none;
    padding: 9px; border-radius: 5px; cursor: pointer;
    font-size: 13px; font-weight: 500;
    transition: background 0.12s;
  }
  #add-btn:hover { background: #1e57e0; }
  #add-btn:disabled { background: #ececf0; color: #b0b4be; cursor: not-allowed; }

  /* ─── Annotations list ────────────────────────────────────────────── */
  #annotations-list { flex: 1; overflow-y: auto; padding: 14px 16px; }
  .annotation-card {
    background: #ffffff; border: 1px solid #e5e6eb; border-radius: 6px;
    padding: 10px 12px; margin-bottom: 8px; position: relative;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .annotation-card:hover {
    border-color: #c8d4ee; box-shadow: 0 1px 3px rgba(43,108,255,0.06);
  }
  .annotation-id {
    font-size: 11px; color: #8b8f99;
    font-family: "JetBrains Mono", monospace; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .annotation-label {
    font-size: 13px; color: #1f2024; margin: 5px 0 2px; font-weight: 500;
  }
  .annotation-notes { font-size: 11.5px; color: #5b606b; line-height: 1.45; margin-top: 2px; }
  .annotation-meta {
    font-size: 10.5px; color: #8b8f99;
    font-family: "JetBrains Mono", monospace; margin-top: 5px;
    font-variant-numeric: tabular-nums;
  }
  .delete-btn {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px; border-radius: 4px;
    background: none; border: none; color: #b0b4be;
    cursor: pointer; font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, color 0.12s;
  }
  .delete-btn:hover { background: #fdeede; color: #f08a3e; }
  #empty-list { color: #b0b4be; font-size: 12px; text-align: center; padding: 20px 0; }

  /* Scrollbars — light, subtle */
  #annotations-list::-webkit-scrollbar, #scad-code::-webkit-scrollbar { width: 8px; height: 8px; }
  #annotations-list::-webkit-scrollbar-thumb, #scad-code::-webkit-scrollbar-thumb {
    background: #d8dae0; border-radius: 4px;
  }
  #annotations-list::-webkit-scrollbar-thumb:hover, #scad-code::-webkit-scrollbar-thumb:hover {
    background: #b0b4be;
  }

  /* ─── Export bar ──────────────────────────────────────────────────── */
  #export-bar {
    padding: 10px 16px; border-top: 1px solid #ececf0;
    display: flex; gap: 6px; flex-shrink: 0; background: #fafafb;
  }
  #export-bar button {
    flex: 1; background: #ffffff; color: #1f2024;
    border: 1px solid #e5e6eb; padding: 7px;
    border-radius: 5px; cursor: pointer; font-size: 12px;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  #export-bar button:hover {
    border-color: #2b6cff; color: #2b6cff; background: #f5f8ff;
  }
  #export-bar button:disabled {
    background: #fafafb; border-color: #ececf0; color: #b0b4be;
    cursor: not-allowed;
  }

  /* CSS2DRenderer 容器及其所有子元素不得拦截任何鼠标/拖拽事件 */
  #canvas-wrapper > div, #canvas-wrapper > div * { pointer-events: none !important; }

  /* ─── 3D 标签 — light pill, blue for face, orange for edge ────────── */
  .face-label {
    background: rgba(255,255,255,0.96);
    border: 1px solid #2b6cff;
    border-radius: 10px;
    padding: 3px 9px 3px 7px;
    font-size: 11px;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    color: #1f2024;
    white-space: nowrap; pointer-events: none;
    box-shadow: 0 2px 6px rgba(15,23,42,0.10);
    display: flex; align-items: center; gap: 5px; line-height: 1.5;
  }
  .face-label-id {
    font-family: "JetBrains Mono", monospace; font-weight: 700;
    color: #2b6cff; font-size: 10px;
  }
  .face-label-text { color: #1f2024; }

  .edge-label {
    background: rgba(255,255,255,0.96);
    border: 1px solid #f08a3e;
    border-radius: 10px;
    padding: 3px 9px 3px 7px;
    font-size: 11px;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    color: #1f2024;
    white-space: nowrap; pointer-events: none;
    box-shadow: 0 2px 6px rgba(15,23,42,0.10);
    display: flex; align-items: center; gap: 5px; line-height: 1.5;
  }
  .edge-label-id {
    font-family: "JetBrains Mono", monospace; font-weight: 700;
    color: #f08a3e; font-size: 10px;
  }

  /* Annotation card type badges */
  .ann-type {
    display: inline-flex; align-items: center; justify-content: center;
    height: 16px; min-width: 18px; padding: 0 5px;
    font-size: 10px; font-weight: 600;
    border-radius: 3px; font-family: inherit;
  }
  .ann-type.face { background: #eaf1ff; color: #2b6cff; }
  .ann-type.edge { background: #fdeede; color: #f08a3e; }
  .annotation-card.edge-card:hover {
    border-color: #f0c8a0; box-shadow: 0 1px 3px rgba(240,138,62,0.10);
  }
  .annotation-card.invalid {
    border-color: #f3c89c; background: #fff8f0;
  }
  .ann-invalid-badge {
    display: inline-flex; align-items: center; height: 16px;
    padding: 0 6px; font-size: 10px; font-weight: 600;
    border-radius: 3px; margin-left: 4px;
    background: #fdeede; color: #c46420;
  }

  /* ─── STL picker modal ───────────────────────────────────────────── */
  #stl-picker-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(31,32,36,0.35); backdrop-filter: blur(2px);
    z-index: 999; align-items: center; justify-content: center;
  }
  #stl-picker-box {
    background: #ffffff; border: 1px solid #e5e6eb;
    border-radius: 10px; padding: 22px 24px;
    min-width: 300px; max-width: 440px;
    box-shadow: 0 12px 32px rgba(15,23,42,0.18);
  }
  #stl-picker-box h3 { font-size: 14px; color: #1f2024; margin-bottom: 4px; font-weight: 600; }
  #stl-picker-box p { font-size: 12px; color: #8b8f99; margin-bottom: 14px; }
  #stl-picker-list { display: flex; flex-direction: column; gap: 6px; }
  .stl-pick-btn {
    background: #fafafb; color: #1f2024;
    border: 1px solid #e5e6eb; padding: 9px 12px;
    border-radius: 6px; cursor: pointer; font-size: 12.5px;
    text-align: left; font-family: "JetBrains Mono", monospace;
    transition: border-color 0.12s, background 0.12s;
  }
  .stl-pick-btn:hover {
    background: #f5f8ff; border-color: #2b6cff; color: #2b6cff;
  }
  #stl-picker-cancel {
    margin-top: 14px; width: 100%;
    background: #ffffff; border: 1px solid #e5e6eb;
    color: #5b606b; padding: 8px; border-radius: 6px;
    cursor: pointer; font-size: 12.5px;
    transition: border-color 0.12s, color 0.12s;
  }
  #stl-picker-cancel:hover { border-color: #c8ccd4; color: #1f2024; }

  /* ─── Mode option buttons ────────────────────────────────────────── */
  .mode-option-btn {
    background: #fafafb; border: 1px solid #e5e6eb; border-radius: 7px;
    padding: 14px 16px; cursor: pointer; text-align: left;
    font-family: inherit; width: 100%;
    transition: border-color 0.12s, background 0.12s;
  }
  .mode-option-btn:hover { background: #f5f8ff; border-color: #2b6cff; }
  .mode-option-btn strong { display: block; font-size: 13px; color: #1f2024; margin-bottom: 4px; }
  .mode-option-btn span { font-size: 11.5px; color: #8b8f99; line-height: 1.4; }
</style>
</head>
<body>

<div id="header">
  <h1>SCAD 几何标注工具</h1>
  <button id="toggle-scad" title="显示/隐藏 SCAD 预览">SCAD</button>
  <button id="watch-btn" title="关联本地 OpenSCAD 项目文件夹">关联 OpenSCAD 项目</button>
  <div id="watch-indicator"><div id="watch-dot"></div><span id="watch-label">监视中</span></div>
  <label style="font-size:11px;color:#8b8f99;display:flex;align-items:center;gap:4px;flex-shrink:0;">
    模型精度
    <select id="fn-select" style="height:24px;border:1px solid #e5e6eb;border-radius:4px;padding:0 6px;font-size:11px;background:#fff;color:#1f2024;cursor:pointer;">
      <option value="16">快速预览</option>
      <option value="32" selected>标准</option>
      <option value="64">精细</option>
    </select>
  </label>
  <span id="status">正在加载 OpenSCAD…</span>
</div>

<div id="main">
  <div id="scad-panel">
    <div id="scad-header">
      <h3 id="scad-filename">SCAD 预览</h3>
      <span id="scad-mtime">—</span>
    </div>
    <pre id="scad-code"><span style="color:#b0b4be">启动监视后自动加载…</span></pre>
  </div>
  <div id="canvas-wrapper">
    <div id="drop-hint">
      <div class="icon">📦</div>
      <p>拖拽 STL 文件到此处</p>
      <p style="margin-top:6px;font-size:12px;">或点击上方"关联 OpenSCAD 项目"</p>
    </div>
  </div>

  <div id="sidebar">
    <div id="face-info">
      <h3 id="selection-title" class="section-h">选中元素</h3>
      <div id="no-selection">点击模型的面或边以查看属性</div>
      <!-- 面属性 -->
      <div id="face-props" style="display:none">
        <div class="info-row"><span class="info-label">法线</span><span class="info-value" id="prop-normal">—</span></div>
        <div class="info-row"><span class="info-label">点击坐标</span><span class="info-value" id="prop-point">—</span></div>
        <div class="info-row"><span class="info-label">面积估算</span><span class="info-value" id="prop-area">—</span></div>
        <div class="info-row"><span class="info-label">语义方向</span><span class="info-value"><span id="prop-semantic" class="semantic-badge">—</span></span></div>
        <div class="info-row"><span class="info-label">置信度</span><span class="info-value" id="prop-confidence">—</span></div>
      </div>
      <!-- 边属性 -->
      <div id="edge-props" style="display:none">
        <div class="info-row"><span class="info-label">长度</span><span class="info-value" id="prop-edge-len">—</span></div>
        <div class="info-row"><span class="info-label">起点</span><span class="info-value" id="prop-edge-start">—</span></div>
        <div class="info-row"><span class="info-label">终点</span><span class="info-value" id="prop-edge-end">—</span></div>
        <div class="info-row"><span class="info-label">方向</span><span class="info-value" id="prop-edge-dir">—</span></div>
      </div>
    </div>

    <div id="annotation-form">
      <h3 class="section-h">添加标注</h3>
      <label>标签（Label）</label>
      <input type="text" id="input-label" list="label-presets" placeholder="输入或从下拉选择…" autocomplete="off">
      <!-- 边缘标注 datalist：小写字母 -->
      <datalist id="edge-label-presets">
        <option value="a"><option value="b"><option value="c"><option value="d">
        <option value="e"><option value="f"><option value="g"><option value="h">
        <option value="i"><option value="j"><option value="k"><option value="l">
      </datalist>
      <datalist id="label-presets">
        <option value="顶面 (TOP)">
        <option value="底面 (BOTTOM)">
        <option value="前面 (FRONT)">
        <option value="后面 (BACK)">
        <option value="左侧面 (LEFT)">
        <option value="右侧面 (RIGHT)">
        <option value="内壁 (INSIDE)">
        <option value="圆柱面 (CYLINDER)">
        <option value="斜面 (OBLIQUE)">
        <option value="倒角面 (CHAMFER)">
        <option value="圆角面 (FILLET)">
        <option value="安装基准面 (MOUNT)">
        <option value="开孔平面 (OPENING)">
        <option value="螺丝柱顶面">
        <option value="USB接口面">
        <option value="走线槽底面">
      </datalist>
      <label>备注（Notes）</label>
      <textarea id="input-notes" placeholder="如：需要在此面打螺丝孔"></textarea>
      <button id="add-btn" disabled>添加标注</button>
    </div>

    <div id="annotations-list">
      <h3 class="section-h orange">已添加标注</h3>
      <div id="empty-list">暂无标注</div>
    </div>

    <div id="export-bar">
      <button id="btn-save" disabled title="直接写入本地文件（需先选择保存路径）">保存 JSON</button>
      <button id="btn-download" disabled>下载</button>
      <button id="btn-copy" disabled>复制</button>
    </div>
  </div>
</div>

<!-- Plain script: runs immediately, not deferred like modules.
     Captures the File object before dataTransfer is cleared, then
     relays it to the module via a CustomEvent. -->
<script>
window.addEventListener('dragover', e => {
  e.preventDefault();
  document.getElementById('canvas-wrapper')?.classList.add('drag-over');
}, false);
window.addEventListener('dragleave', e => {
  if (e.relatedTarget === null)
    document.getElementById('canvas-wrapper')?.classList.remove('drag-over');
}, false);
window.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('canvas-wrapper')?.classList.remove('drag-over');
  const file = e.dataTransfer?.files[0];
  if (file && file.name.toLowerCase().endsWith('.stl')) {
    window.dispatchEvent(new CustomEvent('stl-file-dropped', { detail: { file } }));
  }
}, false);
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ─── Scene Setup ───────────────────────────────────────────────────────────
const wrapper = document.getElementById('canvas-wrapper');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
wrapper.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.domElement.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
wrapper.appendChild(labelRenderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f1f3);

// Z-up camera: position camera so Z-up model looks natural
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 10000);
camera.position.set(0, -200, 150);
camera.up.set(0, 0, 1);  // Z is up
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.zoomSpeed = 1.2;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.75);
dirLight1.position.set(1, -1, 2);
scene.add(dirLight1);
const dirLight2 = new THREE.DirectionalLight(0xc8d4ee, 0.35);
dirLight2.position.set(-1, 1, -1);
scene.add(dirLight2);

// Axes helper (X=red, Y=green, Z=blue)
scene.add(new THREE.AxesHelper(50));

// Grid on XY plane
const grid = new THREE.GridHelper(200, 20, 0xc8ccd4, 0xdcdfe5);
grid.rotation.x = Math.PI / 2;  // rotate so grid is on XY plane (Z-up)
scene.add(grid);

function resize() {
  const w = wrapper.clientWidth, h = wrapper.clientHeight;
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(wrapper);

// ─── Axis Gizmo (bottom-left overlay) ─────────────────────────────────────
const GIZMO_SIZE = 130;
const gizmoCanvas = document.createElement('canvas');
gizmoCanvas.width = GIZMO_SIZE;
gizmoCanvas.height = GIZMO_SIZE;
Object.assign(gizmoCanvas.style, {
  position: 'absolute', bottom: '16px', left: '16px',
  pointerEvents: 'none', borderRadius: '50%',
});
wrapper.appendChild(gizmoCanvas);
const gCtx = gizmoCanvas.getContext('2d');

// World axes: vec, color, positive label, negative label
const GIZMO_AXES = [
  { vec: new THREE.Vector3(1, 0, 0),  color: '#d93030', pos: '+X 右', neg: '-X 左' },
  { vec: new THREE.Vector3(0, 1, 0),  color: '#2a8a4a', pos: '+Y 前', neg: '-Y 后' },
  { vec: new THREE.Vector3(0, 0, 1),  color: '#2b6cff', pos: '+Z 上', neg: '-Z 下' },
];

function drawGizmo() {
  const cx = GIZMO_SIZE / 2, cy = GIZMO_SIZE / 2, len = 44;
  gCtx.clearRect(0, 0, GIZMO_SIZE, GIZMO_SIZE);

  // Background circle
  gCtx.fillStyle = 'rgba(255, 255, 255, 0.92)';
  gCtx.strokeStyle = 'rgba(0, 0, 0, 0.08)';
  gCtx.lineWidth = 1;
  gCtx.beginPath();
  gCtx.arc(cx, cy, 62, 0, Math.PI * 2);
  gCtx.fill();
  gCtx.stroke();

  // Extract camera right/up/forward from world matrix
  const right = new THREE.Vector3(), up = new THREE.Vector3(), fwd = new THREE.Vector3();
  camera.matrixWorld.extractBasis(right, up, fwd);

  // Project each axis end into 2D screen space (right=+x, up=+y)
  const lines = [];
  for (const ax of GIZMO_AXES) {
    const sx =  ax.vec.dot(right) * len;
    const sy = -ax.vec.dot(up)    * len;   // canvas Y is flipped
    const sz =  ax.vec.dot(fwd);            // depth: negative = toward camera
    lines.push({ sx,  sy,  sz,  color: ax.color, label: ax.pos,  isNeg: false });
    lines.push({ sx: -sx, sy: -sy, sz: -sz, color: ax.color, label: ax.neg, isNeg: true  });
  }
  // Draw back-facing (larger sz = further) lines first
  lines.sort((a, b) => b.sz - a.sz);

  for (const ln of lines) {
    const alpha = ln.isNeg ? 0.28 : 1.0;
    const lw    = ln.isNeg ? 1.5  : 2.5;
    gCtx.globalAlpha = alpha;

    // Shaft
    gCtx.beginPath();
    gCtx.moveTo(cx, cy);
    gCtx.lineTo(cx + ln.sx, cy + ln.sy);
    gCtx.strokeStyle = ln.color;
    gCtx.lineWidth = lw;
    gCtx.stroke();

    // Arrowhead (positive axes only)
    if (!ln.isNeg) {
      const angle = Math.atan2(ln.sy, ln.sx);
      const tip = { x: cx + ln.sx, y: cy + ln.sy };
      gCtx.beginPath();
      gCtx.moveTo(tip.x, tip.y);
      gCtx.lineTo(tip.x - 8 * Math.cos(angle - 0.4), tip.y - 8 * Math.sin(angle - 0.4));
      gCtx.lineTo(tip.x - 8 * Math.cos(angle + 0.4), tip.y - 8 * Math.sin(angle + 0.4));
      gCtx.closePath();
      gCtx.fillStyle = ln.color;
      gCtx.fill();
    }

    // Label
    gCtx.font = ln.isNeg ? '10px monospace' : 'bold 11px monospace';
    gCtx.fillStyle = ln.color;
    gCtx.textAlign = ln.sx > 5 ? 'left' : ln.sx < -5 ? 'right' : 'center';
    gCtx.textBaseline = ln.sy > 5 ? 'top' : ln.sy < -5 ? 'bottom' : 'middle';
    const labelX = cx + ln.sx * 1.28;
    const labelY = cy + ln.sy * 1.28;
    gCtx.fillText(ln.label, labelX, labelY);
  }
  gCtx.globalAlpha = 1;
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
  updateLabelVisibility();
  drawGizmo();
}

// ─── State ─────────────────────────────────────────────────────────────────
let modelMesh = null;
let highlightMesh = null;
let selectedFaceData = null;
let selectedEdgeData = null;
let selectedType = 'none';  // 'face' | 'edge' | 'none'
let annotations = [];
let annotationEdges = [];
let faceCounter = 0;
let edgeCounter = 0;
const labelObjects       = new Map();  // face ann.id → CSS2DObject
const annotationMeshes   = new Map();  // face ann.id → THREE.Mesh
const edgeLabelObjects   = new Map();  // edge ann.id → CSS2DObject
const annotatedEdgeLines = new Map();  // edge ann.id → THREE.LineSegments
let edgeLines = null;      // model edge display lines
let edgeHighlight = null;  // current edge selection (yellow)
let edgePickThreshold = 1.0;

function nextEdgeLetter(n) {
  const abc = 'abcdefghijklmnopqrstuvwxyz';
  if (n < 26) return abc[n];
  return nextEdgeLetter(Math.floor(n / 26) - 1) + abc[n % 26];
}

// Distinct colors for annotated faces (light-theme palette — softer, sit on white bg)
const ANN_COLORS = [
  0x2b6cff, // accent blue
  0xf08a3e, // accent orange
  0x1f8a5b, // green
  0x7c3aed, // violet
  0x0891b2, // teal
  0xd946ef, // pink
  0x65a30d, // lime
  0xea580c, // deep orange
  0x0d9488, // dark teal
  0xb45309, // amber
];
let colorIndex = 0;

function addLabel(ann) {
  const div = document.createElement('div');
  div.className = 'face-label';
  div.innerHTML = `<span class="face-label-id">${ann.id}</span><span class="face-label-text">${escHtml(ann.label)}</span>`;
  const obj = new CSS2DObject(div);
  // Offset label slightly along face normal so it sits above the surface
  const [px, py, pz] = ann.click_point;
  const [nx, ny, nz] = ann.normal;
  const offset = 3;
  obj.position.set(px + nx * offset, py + ny * offset, pz + nz * offset);
  scene.add(obj);
  labelObjects.set(ann.id, obj);
}

function removeLabel(id) {
  const obj = labelObjects.get(id);
  if (obj) { scene.remove(obj); labelObjects.delete(id); }
}

function addAnnotationMesh(ann) {
  if (!modelMesh) return;
  const normal = new THREE.Vector3(...ann.normal);
  const cp     = new THREE.Vector3(...ann.click_point);
  const planeD = cp.dot(normal);
  const positions = collectCoplanarPositions(modelMesh.geometry, normal, planeD);
  const color = ANN_COLORS[colorIndex % ANN_COLORS.length];
  colorIndex++;
  const mesh = makeFaceMesh(positions, color, 0.55, true);
  mesh.position.copy(modelMesh.position);
  scene.add(mesh);
  annotationMeshes.set(ann.id, { mesh, color });
}

function removeAnnotationMesh(id) {
  const entry = annotationMeshes.get(id);
  if (entry) { scene.remove(entry.mesh); entry.mesh.geometry.dispose(); annotationMeshes.delete(id); }
}

function syncAnnotationMeshes() {
  for (const id of [...annotationMeshes.keys()]) {
    if (!annotations.find(a => a.id === id)) removeAnnotationMesh(id);
  }
  for (const ann of annotations) {
    if (!annotationMeshes.has(ann.id)) addAnnotationMesh(ann);
  }
}

function syncLabels() {
  // Remove labels for deleted annotations
  for (const id of [...labelObjects.keys()]) {
    if (!annotations.find(a => a.id === id)) removeLabel(id);
  }
  // Add labels for new annotations
  for (const ann of annotations) {
    if (!labelObjects.has(ann.id)) addLabel(ann);
  }
}

// Check visibility of each label via raycasting against the model
const _rayOcc = new THREE.Raycaster();
function checkLabelOcclusion(obj) {
  const labelPos = new THREE.Vector3();
  obj.getWorldPosition(labelPos);
  const dir = labelPos.clone().sub(camera.position);
  const dist = dir.length();
  _rayOcc.set(camera.position, dir.normalize());
  _rayOcc.far = dist - 0.5;
  const hits = _rayOcc.intersectObject(modelMesh);
  obj.element.style.opacity = hits.length > 0 ? '0' : '1';
  obj.element.style.transition = 'opacity 0.15s';
}
function updateLabelVisibility() {
  if (!modelMesh) return;
  for (const [, obj] of labelObjects)     checkLabelOcclusion(obj);
  for (const [, obj] of edgeLabelObjects) checkLabelOcclusion(obj);
}

// 按 scad-terminology.md：+Y = 前，-Y = 后，+X = 右，-X = 左，+Z = 上，-Z = 下
const SEMANTIC_DIRS = [
  { label: 'TOP',    vec: new THREE.Vector3( 0,  0,  1) },
  { label: 'BOTTOM', vec: new THREE.Vector3( 0,  0, -1) },
  { label: 'RIGHT',  vec: new THREE.Vector3( 1,  0,  0) },
  { label: 'LEFT',   vec: new THREE.Vector3(-1,  0,  0) },
  { label: 'FRONT',  vec: new THREE.Vector3( 0,  1,  0) },
  { label: 'BACK',   vec: new THREE.Vector3( 0, -1,  0) },
];

function inferSemantic(normal) {
  let best = { label: 'OBLIQUE', dot: -Infinity };
  for (const dir of SEMANTIC_DIRS) {
    const dot = normal.dot(dir.vec);
    if (dot > best.dot) best = { label: dir.label, dot };
  }
  return { semantic: best.dot < 0.9 ? 'OBLIQUE' : best.label, confidence: parseFloat(best.dot.toFixed(3)) };
}

// Estimate area of the planar face containing faceIndex (same plane, not just same normal)
function estimatePlanarArea(geometry, faceIndex) {
  const pos = geometry.attributes.position;
  const nor = geometry.attributes.normal;
  const faceNormal = new THREE.Vector3().fromBufferAttribute(nor, faceIndex * 3).normalize();
  const v0 = new THREE.Vector3().fromBufferAttribute(pos, faceIndex * 3);
  const planeD = v0.dot(faceNormal);
  const THRESH = 0.99, PLANE_EPS = 0.15;

  let totalArea = 0;
  const count = pos.count / 3;
  const vA = new THREE.Vector3(), vB = new THREE.Vector3(), vC = new THREE.Vector3();
  const e1 = new THREE.Vector3(), e2 = new THREE.Vector3();
  const triNormal = new THREE.Vector3();

  for (let i = 0; i < count; i++) {
    triNormal.fromBufferAttribute(nor, i * 3).normalize();
    if (triNormal.dot(faceNormal) >= THRESH) {
      vA.fromBufferAttribute(pos, i * 3);
      if (Math.abs(vA.dot(faceNormal) - planeD) <= PLANE_EPS) {
        vB.fromBufferAttribute(pos, i * 3 + 1);
        vC.fromBufferAttribute(pos, i * 3 + 2);
        e1.subVectors(vB, vA); e2.subVectors(vC, vA);
        totalArea += e1.cross(e2).length() / 2;
      }
    }
  }
  return parseFloat(totalArea.toFixed(1));
}

// ─── STL Loading ───────────────────────────────────────────────────────────
function loadSTL(arrayBuffer, preserveAnnotations = false) {
  const loader = new STLLoader();
  const geometry = loader.parse(arrayBuffer);
  geometry.computeVertexNormals();

  if (modelMesh) { scene.remove(modelMesh); modelMesh.geometry.dispose(); }
  if (highlightMesh) { scene.remove(highlightMesh); highlightMesh = null; }
  if (edgeLines) { scene.remove(edgeLines); edgeLines.geometry.dispose(); edgeLines = null; }
  if (edgeHighlight) { scene.remove(edgeHighlight); edgeHighlight.geometry.dispose(); edgeHighlight = null; }

  // Always remove old annotation meshes (tied to old geometry)
  for (const id of [...annotationMeshes.keys()]) removeAnnotationMesh(id);

  if (!preserveAnnotations) {
    for (const id of [...labelObjects.keys()]) removeLabel(id);
    for (const id of [...edgeLabelObjects.keys()]) removeEdgeLabel(id);
    for (const id of [...annotatedEdgeLines.keys()]) removeAnnotatedEdgeLine(id);
    annotations = []; annotationEdges = [];
    faceCounter = 0; edgeCounter = 0; colorIndex = 0;
    renderAnnotations(); updateExportButtons();
  }

  const material = new THREE.MeshStandardMaterial({
    color: 0xc4cad4,
    roughness: 0.55,
    metalness: 0.05,
    side: THREE.DoubleSide,
  });
  modelMesh = new THREE.Mesh(geometry, material);
  scene.add(modelMesh);

  // Edge display lines (subtle dark overlay)
  const edgesGeo = new THREE.EdgesGeometry(geometry, 15);
  edgeLines = new THREE.LineSegments(edgesGeo,
    new THREE.LineBasicMaterial({ color: 0x6b7280 }));
  scene.add(edgeLines);

  // Fit camera to model
  geometry.computeBoundingBox();
  const box = geometry.boundingBox;
  const center = new THREE.Vector3();
  box.getCenter(center);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);

  controls.target.copy(center);
  camera.position.set(center.x, center.y - maxDim * 2, center.z + maxDim * 1.2);
  camera.lookAt(center);
  controls.update();

  edgePickThreshold = maxDim * 0.018;  // adaptive threshold based on model size
  document.getElementById('drop-hint').style.display = 'none';
  document.getElementById('status').textContent = `已加载模型 | 三角面: ${geometry.attributes.position.count / 3 | 0}`;

  selectedFaceData = null;
  updateFaceInfoPanel(null);

  // Re-build colored face meshes for surviving annotations using new geometry
  if (preserveAnnotations) syncAnnotationMeshes();
}

// ─── OpenSCAD WASM Worker ──────────────────────────────────────────────────
const worker = new Worker('/viewer/worker.js', { type: 'module' });
let workerReady   = false;
let compilePending = null;

worker.onmessage = ({ data }) => {
  switch (data.type) {
    case 'ready':
      workerReady = true;
      setStatus('OpenSCAD 就绪');
      break;
    case 'init_error':
      setStatus('OpenSCAD 加载失败 — ' + data.message, '#e03030');
      break;
    case 'result':
      if (compilePending) { compilePending.resolve(data.stl); compilePending = null; }
      break;
    case 'error':
      if (compilePending) { compilePending.reject(new Error(data.message)); compilePending = null; }
      break;
  }
};

function setStatus(msg, color = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = color;
}

function compileScad(source, deps = {}) {
  const fn = parseInt(document.getElementById('fn-select')?.value) || 32;
  return new Promise((resolve, reject) => {
    if (!workerReady) { reject(new Error('OpenSCAD 未就绪，请等待初始化')); return; }
    if (compilePending) compilePending.reject(new Error('cancelled'));
    compilePending = { resolve, reject };
    worker.postMessage({ type: 'compile', source, fn, deps });
  });
}

async function collectDeps() {
  const deps = {};
  try {
    if (workMode === 'external' && externalDirHandle) {
      for await (const [name, handle] of externalDirHandle.entries()) {
        if (handle.kind === 'file' && name.toLowerCase().endsWith('.scad') && name !== watchScadName) {
          deps[name] = await handle.getFile().then(f => f.text());
        }
      }
    } else if (workMode === 'project') {
      const files = await fetch('/api/list-scad').then(r => r.json());
      for (const name of files) {
        if (name !== watchScadName) {
          const resp = await fetch(`/api/scad?file=${encodeURIComponent(name)}`);
          if (resp.ok) deps[name] = (await resp.json()).content;
        }
      }
    }
  } catch {}
  return deps;
}

async function compileAndRender(source, preserve) {
  setStatus('编译中…', '#f08a3e');
  try {
    const deps = await collectDeps();
    const stlBuffer = await compileScad(source, deps);
    loadSTL(stlBuffer, preserve);
    setStatus('编译完成 — ' + watchScadName);
  } catch (e) {
    setStatus('编译失败: ' + e.message, '#e03030');
    console.error('编译失败:', e);
  }
}

// ─── Watch Mode ────────────────────────────────────────────────────────────
let watchTimerId  = null;
let watchScadName = '';
let watchJsonName = '';
let scadLastMod   = 0;
const WATCH_MS    = 2000;

const VIA_SERVER  = location.protocol === 'http:' || location.protocol === 'https:';

function setWatchUI(active, filename = '') {
  const btn = document.getElementById('watch-btn');
  const ind = document.getElementById('watch-indicator');
  const lbl = document.getElementById('watch-label');
  btn.classList.toggle('watching', active);
  btn.textContent = active ? '停止监视' : '监视 SCAD';
  ind.classList.toggle('active', active);
  if (active && filename) lbl.textContent = `监视中: ${filename}`;
}

function startWatching() {
  if (watchTimerId) { stopWatching(); return; }
  document.getElementById('mode-modal').style.display = 'flex';
}

async function startProjectMode() {
  document.getElementById('mode-modal').style.display = 'none';
  if (!VIA_SERVER) {
    alert('项目文件夹模式需要通过服务器访问页面。\n请运行 bash build.sh，然后访问：\nhttp://localhost:8080/viewer/index.html');
    return;
  }
  try {
    const files = await fetch('/api/list-scad').then(r => r.json());
    if (files.length === 0) { alert('model/ 目录中没有 SCAD 文件'); return; }
    workMode = 'project';
    if (files.length === 1) {
      await activateSCAD(files[0]);
    } else {
      showSCADPicker(files, activateSCAD);
    }
  } catch (e) { alert('无法连接服务器，请确认 build.sh 已运行'); console.error(e); }
}

async function activateSCAD(name) {
  watchScadName = name;
  watchJsonName = name.replace(/\.scad$/i, '.json');

  setWatchUI(true, name);
  clearInterval(watchTimerId);

  await refreshSCAD(name, false);
  await restoreAnnotationsFromJSON(watchJsonName);

  watchTimerId = setInterval(async () => {
    try {
      const { mtime } = await fetch(`/api/scad-mtime?file=${encodeURIComponent(name)}`).then(r => r.json());
      if (mtime > scadLastMod) {
        await refreshSCAD(name, true);
      }
    } catch { /* server may be restarting */ }
  }, WATCH_MS);
}

async function refreshSCAD(name, preserve) {
  const resp = await fetch(`/api/scad?file=${encodeURIComponent(name)}`);
  if (!resp.ok) { setStatus('读取 SCAD 失败', '#e03030'); return; }
  const { content, mtime } = await resp.json();
  scadLastMod = mtime;
  renderScadPreview(name, content, mtime);
  await compileAndRender(content, preserve);
}

// ─── SCAD 预览 ────────────────────────────────────────────────────────────
const SCAD_KW = /\b(module|function|for|if|else|let|each|include|use|difference|union|intersection|hull|minkowski|linear_extrude|rotate_extrude|translate|rotate|scale|mirror|multmatrix|color|offset|projection|render|surface|cube|sphere|cylinder|polyhedron|polygon|circle|square|text|import)\b/g;

function highlightScad(code) {
  const escaped = code
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return escaped
    .split('\n')
    .map(line => {
      let h = line
        .replace(/\/\/.*$/g,         m => `<span class="cm">${m}</span>`)
        .replace(/"[^"]*"/g,         m => `<span class="st">${m}</span>`)
        .replace(/\b\d+(\.\d+)?\b/g, m => `<span class="nm">${m}</span>`)
        .replace(SCAD_KW,            m => `<span class="kw">${m}</span>`);
      return `<span class="ln">${h}</span>`;
    })
    .join('');
}

function renderScadPreview(scadName, content, mtime) {
  document.getElementById('scad-filename').textContent = scadName;
  document.getElementById('scad-mtime').textContent = new Date(mtime * 1000).toLocaleTimeString();
  document.getElementById('scad-code').innerHTML = highlightScad(content);
}

async function loadScadPreview(scadName) {
  const resp = await fetch(`/api/scad?file=${encodeURIComponent(scadName)}`);
  if (!resp.ok) {
    document.getElementById('scad-code').innerHTML = `<span style="color:#555">${scadName} 不存在</span>`;
    document.getElementById('scad-filename').textContent = 'SCAD 预览';
    return;
  }
  const { content, mtime } = await resp.json();
  scadLastMod = mtime;
  renderScadPreview(scadName, content, mtime);
}

// ─── 从 JSON 恢复标注 ────────────────────────────────────────────────────
function applyAnnotationData(data) {
  if ((!data.faces || data.faces.length === 0) && (!data.edges || data.edges.length === 0)) return;

  annotations = (data.faces || []).map(f => ({
    id: f.id, label: f.label || '', notes: f.notes || '',
    normal: f.normal, click_point: f.click_point,
    area_mm2: f.area_mm2, semantic: f.semantic,
    semantic_confidence: f.semantic_confidence, faceIndex: null,
    status: f.status || 'valid',
  }));
  faceCounter = annotations.reduce((max, a) => Math.max(max, parseInt(a.id.replace('face_', '')) || 0), 0);
  colorIndex  = faceCounter % ANN_COLORS.length;

  annotationEdges = (data.edges || []).map(e => ({
    id: e.id, label: e.label || '', notes: e.notes || '',
    start: e.start, end: e.end, midpoint: e.midpoint,
    direction: e.direction, length_mm: e.length_mm,
    status: e.status || 'valid',
  }));
  edgeCounter = annotationEdges.reduce((max, a) => {
    const letter = a.id.replace('edge_', '');
    let n = 0;
    for (const ch of letter) n = n * 26 + ch.charCodeAt(0) - 97 + 1;
    return Math.max(max, n);
  }, 0);

  for (const id of [...annotatedEdgeLines.keys()]) removeAnnotatedEdgeLine(id);
  for (const id of [...edgeLabelObjects.keys()]) removeEdgeLabel(id);
  annotationEdges.forEach(ann => { addAnnotatedEdgeLine(ann); addEdgeLabel(ann); });

  renderAnnotations();
  updateExportButtons();
  if (annotations.length) flashStatus(`已恢复 ${annotations.length} 个标注`);
}

async function restoreAnnotationsFromJSON(jsonName) {
  try {
    const resp = await fetch(`/api/json?file=${encodeURIComponent(jsonName)}`);
    if (!resp.ok) return;
    applyAnnotationData(await resp.json());
  } catch (e) { console.error('恢复标注失败', e); }
}

function showSCADPicker(files, onSelect) {

// ─── External Folder Mode ─────────────────────────────────────────────────
let workMode          = 'none';   // 'project' | 'external'
let externalDirHandle = null;
let externalLastContent = '';

async function startExternalMode() {
  document.getElementById('mode-modal').style.display = 'none';
  if (!window.showDirectoryPicker) {
    alert('此功能需要 Chrome 或 Edge 浏览器（107+）。'); return;
  }
  let dirHandle;
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
  } catch (e) {
    if (e.name !== 'AbortError') setStatus('无法打开文件夹', '#e03030');
    return;
  }

  setStatus('正在初始化文件夹…', '#f08a3e');

  // Scan for SCAD files
  const scadFiles = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === 'file' && name.toLowerCase().endsWith('.scad')) scadFiles.push(name);
  }

  // No SCAD → create example.scad from project template
  if (scadFiles.length === 0) {
    const resp = await fetch('/model/example.scad');
    const content = resp.ok ? await resp.text() : 'cube([10, 10, 10]);\n';
    await writeExternalFile(dirHandle, 'example.scad', content);
    scadFiles.push('example.scad');
  }

  // Write AI_CONTEXT.md to folder
  const aiResp = await fetch('/model/AI_CONTEXT.md');
  if (aiResp.ok) await writeExternalFile(dirHandle, 'AI_CONTEXT.md', await aiResp.text());

  // Create empty JSON for each SCAD that doesn't have one
  for (const scadName of scadFiles) {
    const jsonName = scadName.replace(/\.scad$/i, '.json');
    try { await dirHandle.getFileHandle(jsonName); } catch {
      const empty = JSON.stringify({
        version: '1.0', scad_file: scadName,
        stl_file: scadName.replace(/\.scad$/i, '.stl'),
        generated_at: new Date().toISOString().slice(0, 19),
        coordinate_system: 'OpenSCAD (Z-up, mm)',
        faces: [], edges: [],
      }, null, 2);
      await writeExternalFile(dirHandle, jsonName, empty);
    }
  }

  externalDirHandle = dirHandle;
  workMode = 'external';

  if (scadFiles.length === 1) {
    await activateExternalSCAD(scadFiles[0]);
  } else {
    showSCADPicker(scadFiles, activateExternalSCAD);
  }
}

async function writeExternalFile(dirHandle, filename, content) {
  const fh = await dirHandle.getFileHandle(filename, { create: true });
  const w  = await fh.createWritable();
  await w.write(content);
  await w.close();
}

async function activateExternalSCAD(name) {
  watchScadName    = name;
  watchJsonName    = name.replace(/\.scad$/i, '.json');
  externalLastContent = '';

  setWatchUI(true, name);
  clearInterval(watchTimerId);

  await refreshExternalSCAD(false);
  await restoreAnnotationsFromExternal();

  flashStatus('已关联文件夹。请让 AI Agent 读取 AI_CONTEXT.md');

  watchTimerId = setInterval(async () => {
    try {
      const fh   = await externalDirHandle.getFileHandle(watchScadName);
      const file = await fh.getFile();
      const content = await file.text();
      if (content !== externalLastContent) {
        externalLastContent = content;
        scadLastMod = file.lastModified / 1000;
        renderScadPreview(watchScadName, content, scadLastMod);
        await compileAndRender(content, true);
      }
    } catch {}
  }, WATCH_MS);
}

async function refreshExternalSCAD(preserve) {
  try {
    const fh   = await externalDirHandle.getFileHandle(watchScadName);
    const file = await fh.getFile();
    const content = await file.text();
    externalLastContent = content;
    scadLastMod = file.lastModified / 1000;
    renderScadPreview(watchScadName, content, scadLastMod);
    await compileAndRender(content, preserve);
  } catch (e) { setStatus('读取 SCAD 失败', '#e03030'); }
}

async function restoreAnnotationsFromExternal() {
  try {
    const fh   = await externalDirHandle.getFileHandle(watchJsonName);
    const file = await fh.getFile();
    applyAnnotationData(JSON.parse(await file.text()));
  } catch { /* JSON 不存在，跳过 */ }
}

// ─── STL drag-drop fallback (no button needed) ────────────────────────────
function readFile(file, preserve = false) {
  setStatus(`正在加载 ${file.name}…`);
  const reader = new FileReader();
  reader.onload = ev => loadSTL(ev.target.result, preserve);
  reader.readAsArrayBuffer(file);
}
window.addEventListener('stl-file-dropped', e => { stopWatching(); readFile(e.detail.file, false); });

// ─── Face Selection via Raycaster ──────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let mouseDown = { x: 0, y: 0 };

renderer.domElement.addEventListener('mousedown', e => {
  mouseDown.x = e.clientX;
  mouseDown.y = e.clientY;
});

renderer.domElement.addEventListener('mouseup', e => {
  // Only trigger click if mouse didn't move much (not a drag)
  if (Math.abs(e.clientX - mouseDown.x) > 4 || Math.abs(e.clientY - mouseDown.y) > 4) return;
  if (!modelMesh) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // ── Edge detection first ──
  if (edgeLines) {
    raycaster.params.Line = { threshold: edgePickThreshold };
    const edgeHits = raycaster.intersectObject(edgeLines);
    if (edgeHits.length > 0) {
      handleEdgeClick(edgeHits[0]);
      return;
    }
  }

  // ── Face detection ──
  const hits = raycaster.intersectObject(modelMesh);
  if (hits.length === 0) { clearSelection(); return; }

  const hit = hits[0];
  const faceIndex = hit.faceIndex;
  const geometry = modelMesh.geometry;
  const nor = geometry.attributes.normal;
  const normal = new THREE.Vector3().fromBufferAttribute(nor, faceIndex * 3).normalize();
  const clickPoint = hit.point;
  const area = estimatePlanarArea(geometry, faceIndex);
  const { semantic, confidence } = inferSemantic(normal);

  selectedFaceData = {
    faceIndex,
    normal:     [normal.x, normal.y, normal.z].map(v => parseFloat(v.toFixed(2))),
    click_point:[clickPoint.x, clickPoint.y, clickPoint.z].map(v => parseFloat(v.toFixed(2))),
    area_mm2: area, semantic, semantic_confidence: confidence,
  };
  selectedEdgeData = null;
  selectedType = 'face';

  if (edgeHighlight) { scene.remove(edgeHighlight); edgeHighlight.geometry.dispose(); edgeHighlight = null; }
  updateSelectionPanel();
  showHighlight(geometry, faceIndex, normal);
  document.getElementById('input-label').setAttribute('list', 'label-presets');
  document.getElementById('add-btn').disabled = false;
});

function handleEdgeClick(hit) {
  const pos = edgeLines.geometry.attributes.position;
  // hit.index is the vertex index in the LineSegments; edges are pairs 0-1, 2-3, ...
  const i = hit.index % 2 === 0 ? hit.index : hit.index - 1;
  const vA = new THREE.Vector3().fromBufferAttribute(pos, i);
  const vB = new THREE.Vector3().fromBufferAttribute(pos, i + 1);
  const mid = vA.clone().add(vB).multiplyScalar(0.5);
  const dir = vB.clone().sub(vA).normalize();

  selectedEdgeData = {
    segIdx:    i,
    start:     [vA.x, vA.y, vA.z].map(v => parseFloat(v.toFixed(2))),
    end:       [vB.x, vB.y, vB.z].map(v => parseFloat(v.toFixed(2))),
    midpoint:  [mid.x, mid.y, mid.z].map(v => parseFloat(v.toFixed(2))),
    direction: [dir.x, dir.y, dir.z].map(v => parseFloat(v.toFixed(2))),
    length_mm: parseFloat(vA.distanceTo(vB).toFixed(2)),
  };
  selectedFaceData = null;
  selectedType = 'edge';

  // Yellow selection highlight
  if (edgeHighlight) { scene.remove(edgeHighlight); edgeHighlight.geometry.dispose(); }
  const hlGeo = new THREE.BufferGeometry().setFromPoints([vA, vB]);
  edgeHighlight = new THREE.LineSegments(hlGeo,
    new THREE.LineBasicMaterial({ color: 0xf08a3e, depthTest: false, linewidth: 2 }));
  scene.add(edgeHighlight);

  // Clear face highlight
  if (highlightMesh) { scene.remove(highlightMesh); highlightMesh = null; }

  updateSelectionPanel();
  // Auto-fill label with next predicted letter
  document.getElementById('input-label').value = nextEdgeLetter(edgeCounter);
  document.getElementById('input-label').setAttribute('list', 'edge-label-presets');
  document.getElementById('add-btn').disabled = false;
}

function clearSelection() {
  selectedFaceData = null; selectedEdgeData = null; selectedType = 'none';
  if (highlightMesh) { scene.remove(highlightMesh); highlightMesh = null; }
  if (edgeHighlight) { scene.remove(edgeHighlight); edgeHighlight.geometry.dispose(); edgeHighlight = null; }
  updateSelectionPanel();
  document.getElementById('add-btn').disabled = true;
}

// Edge label (CSS2DObject, orange style)
function addEdgeLabel(ann) {
  const div = document.createElement('div');
  div.className = 'edge-label';
  div.innerHTML = `<span class="edge-label-id">${ann.id}</span><span class="face-label-text">${escHtml(ann.label)}</span>`;
  const obj = new CSS2DObject(div);
  const [mx, my, mz] = ann.midpoint;
  obj.position.set(mx, my, mz);
  scene.add(obj);
  edgeLabelObjects.set(ann.id, obj);
}
function removeEdgeLabel(id) {
  const obj = edgeLabelObjects.get(id);
  if (obj) { scene.remove(obj); edgeLabelObjects.delete(id); }
}

// Red highlight line for annotated edges
function addAnnotatedEdgeLine(ann) {
  const [ax, ay, az] = ann.start, [bx, by, bz] = ann.end;
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(ax, ay, az), new THREE.Vector3(bx, by, bz),
  ]);
  const line = new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({ color: 0xf08a3e, depthTest: false }));
  scene.add(line);
  annotatedEdgeLines.set(ann.id, line);
}
function removeAnnotatedEdgeLine(id) {
  const line = annotatedEdgeLines.get(id);
  if (line) { scene.remove(line); line.geometry.dispose(); annotatedEdgeLines.delete(id); }
}

// Collect triangles matching both normal direction AND the same plane (normal + d).
// planeD = dot(normal, any_point_on_plane) — distinguishes parallel faces at different depths.
function collectCoplanarPositions(geometry, normal, planeD, normalThresh = 0.99, planeEps = 0.15) {
  const pos = geometry.attributes.position;
  const nor = geometry.attributes.normal;
  const count = pos.count / 3;
  const positions = [];
  const vA = new THREE.Vector3(), vB = new THREE.Vector3(), vC = new THREE.Vector3();
  const triNormal = new THREE.Vector3();
  for (let i = 0; i < count; i++) {
    triNormal.fromBufferAttribute(nor, i * 3).normalize();
    if (triNormal.dot(normal) >= normalThresh) {
      vA.fromBufferAttribute(pos, i * 3);
      // Check that this triangle sits on the same plane (within epsilon)
      if (Math.abs(vA.dot(normal) - planeD) <= planeEps) {
        vB.fromBufferAttribute(pos, i * 3 + 1);
        vC.fromBufferAttribute(pos, i * 3 + 2);
        positions.push(vA.x, vA.y, vA.z, vB.x, vB.y, vB.z, vC.x, vC.y, vC.z);
      }
    }
  }
  return positions;
}

function makeFaceMesh(positions, color, opacity, depthTest) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  return new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    color,
    roughness: 0.4,
    metalness: 0.1,
    side: THREE.DoubleSide,
    transparent: true,
    opacity,
    depthTest,
    polygonOffset: true,
    polygonOffsetFactor: -2,
    polygonOffsetUnits: -2,
  }));
}

function showHighlight(geometry, faceIndex, normal) {
  if (highlightMesh) { scene.remove(highlightMesh); highlightMesh.geometry.dispose(); }
  // Compute planeD from the clicked triangle's first vertex
  const v0 = new THREE.Vector3().fromBufferAttribute(geometry.attributes.position, faceIndex * 3);
  const planeD = v0.dot(normal);
  const positions = collectCoplanarPositions(geometry, normal, planeD);
  highlightMesh = makeFaceMesh(positions, 0x2b6cff, 0.7, false);
  highlightMesh.position.copy(modelMesh.position);
  scene.add(highlightMesh);
}

// ─── UI Updates ────────────────────────────────────────────────────────────
function updateSelectionPanel() {
  const noSel    = document.getElementById('no-selection');
  const fProps   = document.getElementById('face-props');
  const eProps   = document.getElementById('edge-props');
  const title    = document.getElementById('selection-title');

  noSel.style.display  = 'none';
  fProps.style.display = 'none';
  eProps.style.display = 'none';

  if (selectedType === 'face' && selectedFaceData) {
    title.textContent = '选中面信息';
    fProps.style.display = 'block';
    document.getElementById('prop-normal').textContent     = `[${selectedFaceData.normal.join(', ')}]`;
    document.getElementById('prop-point').textContent      = `[${selectedFaceData.click_point.join(', ')}]`;
    document.getElementById('prop-area').textContent       = `${selectedFaceData.area_mm2} mm²`;
    document.getElementById('prop-semantic').textContent   = selectedFaceData.semantic;
    document.getElementById('prop-confidence').textContent = selectedFaceData.semantic_confidence;
  } else if (selectedType === 'edge' && selectedEdgeData) {
    title.textContent = '选中边信息';
    eProps.style.display = 'block';
    document.getElementById('prop-edge-len').textContent   = `${selectedEdgeData.length_mm} mm`;
    document.getElementById('prop-edge-start').textContent = `[${selectedEdgeData.start.join(', ')}]`;
    document.getElementById('prop-edge-end').textContent   = `[${selectedEdgeData.end.join(', ')}]`;
    document.getElementById('prop-edge-dir').textContent   = `[${selectedEdgeData.direction.join(', ')}]`;
  } else {
    title.textContent = '选中元素';
    noSel.style.display = 'block';
  }
}
// Keep old name as alias for callers that still use it
function updateFaceInfoPanel(data) {
  if (!data) { selectedType = 'none'; selectedFaceData = null; }
  updateSelectionPanel();
}

// ─── Annotations ───────────────────────────────────────────────────────────
document.getElementById('add-btn').addEventListener('click', () => {
  const label = document.getElementById('input-label').value.trim();
  const notes = document.getElementById('input-notes').value.trim();
  document.getElementById('input-label').value = '';
  document.getElementById('input-notes').value = '';

  if (selectedType === 'edge' && selectedEdgeData) {
    const letter = nextEdgeLetter(edgeCounter);
    const id = `edge_${letter}`;
    edgeCounter++;
    const ann = { id, label: label || letter, notes, ...selectedEdgeData };
    annotationEdges.push(ann);
    addAnnotatedEdgeLine(ann);
    addEdgeLabel(ann);
  } else if (selectedType === 'face' && selectedFaceData) {
    faceCounter++;
    const id = `face_${String(faceCounter).padStart(3, '0')}`;
    annotations.push({ id, label: label || `面 ${faceCounter}`, notes, ...selectedFaceData });
  } else return;

  renderAnnotations();
  updateExportButtons();
});

function renderAnnotations() {
  const list  = document.getElementById('annotations-list');
  const empty = document.getElementById('empty-list');
  list.querySelectorAll('.annotation-card').forEach(el => el.remove());

  const total = annotations.length + annotationEdges.length;
  if (total === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  // Face cards
  annotations.forEach(ann => {
    const isInvalid = ann.status === 'invalid';
    const card = document.createElement('div');
    card.className = 'annotation-card' + (isInvalid ? ' invalid' : '');
    card.innerHTML = `
      <div class="annotation-id"><span class="ann-type face">面</span>${ann.id}${isInvalid ? '<span class="ann-invalid-badge">⚠ 失效</span>' : ''}</div>
      <div class="annotation-label">${escHtml(ann.label)}</div>
      ${isInvalid ? '<div class="annotation-notes" style="color:#c46420">几何已变更，请删除后重新标注</div>' : ''}
      ${ann.notes ? `<div class="annotation-notes">${escHtml(ann.notes)}</div>` : ''}
      <div class="annotation-meta">法线: [${ann.normal.join(', ')}] | ${ann.semantic}</div>
      <button class="delete-btn" data-id="${ann.id}" data-type="face" title="删除">×</button>`;
    list.appendChild(card);
  });

  // Edge cards
  annotationEdges.forEach(ann => {
    const isInvalid = ann.status === 'invalid';
    const card = document.createElement('div');
    card.className = 'annotation-card edge-card' + (isInvalid ? ' invalid' : '');
    card.innerHTML = `
      <div class="annotation-id"><span class="ann-type edge">边</span>${ann.id}${isInvalid ? '<span class="ann-invalid-badge">⚠ 失效</span>' : ''}</div>
      <div class="annotation-label">${escHtml(ann.label)}</div>
      ${isInvalid ? '<div class="annotation-notes" style="color:#c46420">几何已变更，请删除后重新标注</div>' : ''}
      ${ann.notes ? `<div class="annotation-notes">${escHtml(ann.notes)}</div>` : ''}
      <div class="annotation-meta">${ann.length_mm} mm | [${ann.direction.join(', ')}]</div>
      <button class="delete-btn" data-id="${ann.id}" data-type="edge" title="删除">×</button>`;
    list.appendChild(card);
  });

  list.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.type === 'edge') {
        removeAnnotatedEdgeLine(btn.dataset.id);
        removeEdgeLabel(btn.dataset.id);
        annotationEdges = annotationEdges.filter(a => a.id !== btn.dataset.id);
      } else {
        annotations = annotations.filter(a => a.id !== btn.dataset.id);
      }
      renderAnnotations();
      updateExportButtons();
    });
  });

  syncLabels();
  syncAnnotationMeshes();
}

function updateExportButtons() {
  const disabled = annotations.length === 0 && annotationEdges.length === 0;
  document.getElementById('btn-save').disabled = disabled;
  document.getElementById('btn-download').disabled = disabled;
  document.getElementById('btn-copy').disabled = disabled;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Export ────────────────────────────────────────────────────────────────
function buildJSON() {
  return JSON.stringify({
    version: '1.0',
    scad_file: watchScadName || 'example.scad',
    stl_file:  watchScadName.replace(/\.scad$/i, '.stl') || 'example.stl',
    generated_at: new Date().toISOString().slice(0, 19),
    coordinate_system: 'OpenSCAD (Z-up, mm)',
    faces: annotations.map(ann => ({
      id: ann.id, label: ann.label,
      normal: ann.normal, click_point: ann.click_point,
      area_mm2: ann.area_mm2, semantic: ann.semantic,
      semantic_confidence: ann.semantic_confidence, notes: ann.notes,
    })),
    edges: annotationEdges.map(ann => ({
      id: ann.id, label: ann.label,
      start: ann.start, end: ann.end,
      midpoint: ann.midpoint, direction: ann.direction,
      length_mm: ann.length_mm, notes: ann.notes,
    })),
  }, null, 2);
}

document.getElementById('btn-save').addEventListener('click', async () => {
  if (workMode === 'external' && externalDirHandle && watchJsonName) {
    try {
      await writeExternalFile(externalDirHandle, watchJsonName, buildJSON());
      flashStatus(`已保存 ${watchJsonName}`);
    } catch (e) { console.error(e); flashStatus('保存失败'); }
  } else if (VIA_SERVER && watchJsonName) {
    try {
      const resp = await fetch('/api/save-json', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: watchJsonName, content: buildJSON() }),
      });
      if (resp.ok) flashStatus(`已保存 ${watchJsonName}`);
      else flashStatus('保存失败');
    } catch (e) { console.error(e); flashStatus('保存失败'); }
  } else {
    document.getElementById('btn-download').click();
  }
});

document.getElementById('btn-download').addEventListener('click', () => {
  const blob = new Blob([buildJSON()], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'geometry.json';
  a.click();
  URL.revokeObjectURL(url);
  flashStatus('已下载 geometry.json');
});

document.getElementById('btn-copy').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(buildJSON());
    flashStatus('已复制到剪贴板');
  } catch {
    flashStatus('复制失败，请手动下载');
  }
});

function flashStatus(msg) {
  const el = document.getElementById('status');
  const prev = el.textContent;
  el.textContent = msg;
  el.style.color = '#2b6cff';
  setTimeout(() => { el.textContent = prev; el.style.color = ''; }, 2000);
}

// ─── Mode modal buttons ───────────────────────────────────────────────────
document.getElementById('btn-mode-project').addEventListener('click', startProjectMode);
document.getElementById('btn-mode-external').addEventListener('click', startExternalMode);
document.getElementById('btn-mode-cancel').addEventListener('click', () => {
  document.getElementById('mode-modal').style.display = 'none';
});

// Start render loop after all state variables are declared
animate();

    <button id="btn-mode-cancel" style="width:100%;background:#ffffff;border:1px solid #e5e6eb;color:#5b606b;padding:8px;border-radius:6px;cursor:pointer;font-size:12.5px;font-family:inherit;">取消</button>
  </div>
</div>
